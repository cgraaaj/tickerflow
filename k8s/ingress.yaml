apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tickerflow-ingress
  namespace: tickerflow
  labels:
    app: tickerflow
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: tickerflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tickerflow-api
                port:
                  number: 80
  # Uncomment and configure for TLS
  # tls:
  #   - hosts:
  #       - tickerflow.local
  #     secretName: tickerflow-tls
