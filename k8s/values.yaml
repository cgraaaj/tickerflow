replicaCount: 2

image:
  repository: registry.cgraaaj.in/stock-x/tickerflow-svc
  pullPolicy: IfNotPresent
  tag: "7f75518"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "tickerflow-svc-sa"

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false

ingressRoute:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: traefik-external
  entryPoints:
    - websecure
  routes:
    - match: Host(`tickerflow.cgraaaj.in`) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/static`))
      kind: Rule
      services:
        - port: 8000
  tls:
    secretName: "wildcard-cgraaaj-in-tls"

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

livenessProbe:
  httpGet:
    path: /api/v1/health/live/
    port: http
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/health/ready/
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

externalDatabase:
  enabled: true
  host: "192.168.1.40"
  port: 5432

vault:
  enabled: true
  path: "kv-v2"
  addr: "http://hashicorpvault-agent-injector.hashicorp.svc.cluster.local:8200"
  auth:
    role: "tickerflow-svc-role"
  agent:
    limits:
      cpu: "100m"
      memory: "128Mi"
    requests:
      cpu: "10m"
      memory: "64Mi"
  secretVolumePath: "/vault/secrets"
  inject:
    env:
      app-config: "kv-v2/data/tickerflow/app-config"
    secrets:
      db-creds: "database/creds/tickerflow-rw"
    templates:
      app-config: |
        {{- with secret "kv-v2/data/tickerflow/app-config" -}}
        export DJANGO_SECRET_KEY="{{ .Data.data.DJANGO_SECRET_KEY }}"
        {{- end }}
      db-creds: |
        {{- with secret "database/creds/tickerflow-rw" -}}
        export DB_USER="{{ .Data.username }}"
        export DB_PASSWORD="{{ .Data.password }}"
        {{- end }}

runtime:
  sourceInjectedFiles:
    enabled: true
    files:
      - "app-config"
      - "db-creds"

env:
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: "*"
  CSRF_TRUSTED_ORIGINS: "https://tickerflow.cgraaaj.in"
  DB_NAME: "stock-dumps"
  DB_CONN_MAX_AGE: "600"

secrets:
  DJANGO_SECRET_KEY: "CHANGE-ME-generate-a-long-random-string"
  DB_PASSWORD: "CHANGE-ME-your-db-password"
